services:
  backend:
    build:
      context: ./backend
    container_name: telegram-chat-backend
    env_file:
      - ./backend/.env          # must contain TELEGRAM_BOT_TOKEN=<your_token>
    ports:
      - "8000:8000"
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
    container_name: telegram-chat-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
